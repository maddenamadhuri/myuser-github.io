<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Immu 💖</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles" class="particles"></div>

    <section class="hero">
        <div class="hero-content">
            <h1 class="typewriter">Happy Birthday Immu 💖</h1>
            <p class="fade-in">Today is all about celebrating you.</p>
            <button class="cta-button" onclick="scrollToSection('slideshow-section')">Click Here for a Surprise ✨</button>
        </div>
    </section>

    <section id="slideshow-section" class="content-section">
        <h2 class="section-title">Surprise🎉</h2>
        <div class="slideshow-container">
            <div class="mySlides fade"><img src="images/five.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/one (2).jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/six.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/nine.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/ten.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/two.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/three.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/seven.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/one.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/four.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/fourteen.jpeg" style="width:100%"></div>
            <div class="mySlides fade"><img src="images/fifteen.jpeg" style="width:100%"></div>
            
            <div class="dot-container" id="dot-container">
                </div>
        </div>
    </section>

    <section class="content-section">
        <h2 class="section-title">Special Messages</h2>
        <div class="video-grid">
            <div class="video-card">
                <video controls>
                    <source src="videos/twelvw.mp4" type="video/mp4">
                </video>
            </div>
            <div class="video-card">
                <video controls>
                    <source src="videos/thirtheen.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </section>

    <section class="message-section">
        <div class="message-card">
            <h2>A Special Note</h2>
            <p>I hope your day is as wonderful as you are. Cheers to many more years of happiness together!</p>
            <div class="signature">With Love, [Madhu]</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
